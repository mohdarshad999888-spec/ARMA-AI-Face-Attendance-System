<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ARMA Classes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-logo">
                <div class="brand-mark">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M8.5 12H15.5M12 8.5V15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <div class="brand-title">ARMA CLASSES</div>
                    <p class="muted">Face Attendance Console</p>
                </div>
            </div>

            <p class="eyebrow">Secure Admin Access</p>
            <h1>Welcome back</h1>
            <p class="muted">Sign in to manage registrations, live attendance, and Firebase reports.</p>

            <form method="POST" action="/login" id="loginForm">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="admin@gmail.com" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Enter password" required>

                <button type="submit" id="loginBtn">Launch Dashboard</button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById("loginForm").addEventListener("submit", () => {
            document.getElementById("loginBtn").classList.add("loading");
        });
    </script>
</body>
</html>
